version: 1

# single repo
repo: owner/repo

# multi-repo (overrides repo)
# repos:
#   - owner/repo1
#   - owner/repo2
#   - owner/repo3

vision_doc: ./VISION.md

# per-repo vision docs (overrides vision_doc for specific repos)
# vision_docs:
#   owner/repo1: ./VISION_1.md
#   owner/repo2: ./VISION_2.md

thresholds:
  duplicate_similarity: 0.85
  aligned: 0.65
  drifting: 0.40

scoring:
  weights:
    has_tests: 0.25
    ci_passing: 0.20
    diff_size_penalty: 0.15
    author_history: 0.15
    description_quality: 0.15
    review_approvals: 0.10

labels:
  duplicate: "prism:duplicate"
  aligned: "prism:aligned"
  drifting: "prism:drifting"
  off_vision: "prism:off-vision"
  top_pick: "prism:top-pick"

batch_size: 50
max_prs: 5000
